<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>OG Image Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px;
      gap: 20px;
      font-family: system-ui, sans-serif;
      color: #e2e8f0;
    }
    .page-title { font-size: 12px; opacity: 0.35; letter-spacing: 0.12em; text-transform: uppercase; }

    #three-canvas { display: none; }

    #output {
      border-radius: 10px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
      max-width: 90vw;
      height: auto;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
      justify-content: center;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 11px;
      color: #64748b;
    }
    input[type="text"] {
      background: #1a1a2e;
      border: 1px solid #2d2d45;
      color: #e2e8f0;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      width: 280px;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--theme-color, #fbbf24); }
    input[type="range"] {
      accent-color: var(--theme-color, #fbbf24);
      width: 130px;
    }

    button {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    button:hover { opacity: 0.8; }

    #btn-save {
      background: var(--theme-color, #fbbf24);
      color: #0d0d0d;
    }
    #btn-freeze, #btn-randomize {
      background: #1e2030;
      color: #94a3b8;
      border: 1px solid #2d2d45;
    }

    .variant-tabs {
      display: flex;
      gap: 6px;
      background: #161622;
      padding: 5px;
      border-radius: 12px;
      border: 1px solid #2d2d45;
    }
    .btn-variant {
      padding: 8px 22px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #475569;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-variant:hover { color: #94a3b8; opacity: 1; }
    .btn-variant.active {
      background: var(--theme-color, #fbbf24);
      color: #0d0d0d;
      opacity: 1 !important;
    }

    .hint { font-size: 11px; color: #374151; }
    .divider { width: 2px; height: 24px; background: #1e2030; border-radius: 1px; }
  </style>
</head>
<body>
  <div class="page-title">OG Image Generator — 1200 × 630</div>

  <canvas id="three-canvas" width="1200" height="630"></canvas>
  <canvas id="output"       width="1200" height="630"></canvas>

  <div class="variant-tabs">
    <button class="btn-variant active" data-variant="A">Variant A — Particles</button>
    <button class="btn-variant"        data-variant="B">Variant B — Rings</button>
    <button class="btn-variant"        data-variant="C">Variant C — Spheres</button>
    <button class="btn-variant"        data-variant="README">README Banner</button>
  </div>

  <div class="row">
    <div class="field">眉コピー   <input type="text" id="eyebrow"  value="AI × 人材マッチング"></div>
    <div class="field">見出し     <input type="text" id="headline" value="人と企業の、最適な出会いを。"></div>
    <div class="field">サブコピー <input type="text" id="subcopy"  value="5,000社以上の求人から、あなたのキャリアにぴったりの一社を。"></div>
  </div>

  <div class="row">
    <div class="field"><span id="count-label">密度</span>  <input type="range" id="obj-count"     min="100" max="800" value="500"></div>
    <div class="field">透明度    <input type="range" id="obj-opacity"   min="5"   max="90"  value="70"></div>
    <div class="field">背景明度  <input type="range" id="bg-lightness"  min="0"   max="30"  value="8"></div>
    <div class="divider"></div>
    <button id="btn-randomize">Randomize</button>
    <button id="btn-freeze">⏸ Freeze</button>
    <button id="btn-save">Save PNG</button>
  </div>

  <div class="hint">Freeze で止めてから好みのフレームで Save してください</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>

  <script>
    const W = 1200, H = 630;
    const threeCanvas = document.getElementById('three-canvas');
    const output = document.getElementById('output');
    const ctx = output.getContext('2d');

    // ── Theme + shape config per variant ─────────────────────────────────────
    const THEMES = {
      A: {
        shape:         'particles',
        colors:        [0x4f46e5, 0x06b6d4, 0x818cf8, 0x22d3ee, 0x6366f1, 0x0ea5e9, 0x38bdf8],
        bgTopBase:     [0.16, 0.18, 0.60],
        bgBottomBase:  [0.08, 0.10, 0.50],
        keyColor:      0x22d3ee,
        fillColor:     0x4f46e5,
        vigRgb:        '4,8,22',
        accent1:       '#6366f1',
        accent2:       '#06b6d4',
        eyebrowColor:  '#22d3ee',
        glowColor:     'rgba(99,102,241,0.32)',
        themeColor:    '#22d3ee',
        countLabel:    '密度',
        countMin: 100, countMax: 800, countDefault: 500,
        opacityDefault: 75,
        copy: {
          eyebrow:  'AI × 人材マッチング',
          headline: '人と企業の、最適な出会いを。',
          subcopy:  '5,000社以上の求人から、あなたのキャリアにぴったりの一社を。',
        },
      },
      B: {
        shape:         'rings',
        colors:        [0x7c3aed, 0xec4899, 0xa855f7, 0xf0abfc, 0x9333ea, 0xdb2777, 0xc026d3],
        bgTopBase:     [0.26, 0.08, 0.48],
        bgBottomBase:  [0.16, 0.04, 0.38],
        keyColor:      0xa855f7,
        fillColor:     0xec4899,
        vigRgb:        '8,4,16',
        accent1:       '#7c3aed',
        accent2:       '#ec4899',
        eyebrowColor:  '#c084fc',
        glowColor:     'rgba(168,85,247,0.32)',
        themeColor:    '#a855f7',
        countLabel:    'リング数',
        countMin: 3, countMax: 14, countDefault: 7,
        opacityDefault: 40,
        copy: {
          eyebrow:  'AI × 人材マッチング',
          headline: '次のキャリアは、ここから始まる。',
          subcopy:  'AIによるマッチングで、理想の職場との出会いを加速させます。',
        },
      },
      C: {
        shape:         'spheres',
        colors:        [0xfbbf24, 0xf59e0b, 0xf43f5e, 0xfb923c, 0xfcd34d, 0xf97316, 0xfde68a],
        bgTopBase:     [0.30, 0.18, 0.08],
        bgBottomBase:  [0.20, 0.08, 0.04],
        keyColor:      0xfbbf24,
        fillColor:     0xf43f5e,
        vigRgb:        '4,4,12',
        accent1:       '#fbbf24',
        accent2:       '#f43f5e',
        eyebrowColor:  '#fbbf24',
        glowColor:     'rgba(251,191,36,0.28)',
        themeColor:    '#fbbf24',
        countLabel:    '球体数',
        countMin: 3, countMax: 16, countDefault: 9,
        opacityDefault: 28,
        copy: {
          eyebrow:  'AI × 人材マッチング',
          headline: 'あなたの可能性を、一緒に広げよう。',
          subcopy:  '一人ひとりに寄り添い、あなたらしいキャリアを一緒に考えます。',
        },
      },
      README: {
        shape:         'grid',
        colors:        [0x00d084, 0x00b4d8, 0x64ffda, 0xa8ff78, 0x00ff88, 0x22d3ee, 0x34d399],
        bgTopBase:     [0.04, 0.12, 0.10],
        bgBottomBase:  [0.02, 0.06, 0.05],
        keyColor:      0x00d084,
        fillColor:     0x00b4d8,
        vigRgb:        '4,10,8',
        accent1:       '#00d084',
        accent2:       '#00b4d8',
        eyebrowColor:  '#00d084',
        glowColor:     'rgba(0,208,132,0.35)',
        themeColor:    '#00d084',
        countLabel:    '形状数',
        countMin: 2, countMax: 8, countDefault: 4,
        opacityDefault: 60,
        copy: {
          eyebrow:  'Next.js · TypeScript · Three.js · Tailwind · Vercel',
          headline: 'modern-hp',
          subcopy:  'コーポレートHP — A/Bテスト × 3D演出 × フォーム受付',
        },
      },
    };

    let currentTheme = THEMES.A;
    let activeVariant = 'A';

    // ── Renderer ──────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true, alpha: false });
    renderer.setSize(W, H);
    renderer.setPixelRatio(1);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 100);
    camera.position.set(0, 0, 15);

    // ── Background ────────────────────────────────────────────────────────────
    const bgMat = new THREE.ShaderMaterial({
      uniforms: { uTop: { value: new THREE.Color() }, uBottom: { value: new THREE.Color() } },
      vertexShader:   `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
      fragmentShader: `uniform vec3 uTop,uBottom; varying vec2 vUv; void main() { gl_FragColor = vec4(mix(uBottom,uTop,vUv.y),1.0); }`,
      depthWrite: false,
    });
    const bgMesh = new THREE.Mesh(new THREE.PlaneGeometry(80, 50), bgMat);
    bgMesh.position.z = -20;
    scene.add(bgMesh);

    function updateBg() {
      const l = parseInt(document.getElementById('bg-lightness').value) / 100;
      const t = currentTheme;
      bgMat.uniforms.uTop.value.setRGB(   l*t.bgTopBase[0],    l*t.bgTopBase[1],    l*t.bgTopBase[2]);
      bgMat.uniforms.uBottom.value.setRGB(l*t.bgBottomBase[0], l*t.bgBottomBase[1], l*t.bgBottomBase[2]);
    }
    updateBg();

    // ── Lights ────────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const keyLight  = new THREE.PointLight(currentTheme.keyColor,  2.2);
    keyLight.position.set(8, 8, 12);
    scene.add(keyLight);
    const fillLight = new THREE.PointLight(currentTheme.fillColor, 0.9);
    fillLight.position.set(-10, -5, 6);
    scene.add(fillLight);

    // ── Scene objects (cleared on variant switch) ─────────────────────────────
    let sceneObjects = [];   // THREE.Object3D[]
    let animData     = [];   // per-object animation data

    function clearScene() {
      sceneObjects.forEach(o => scene.remove(o));
      sceneObjects = []; animData = [];
    }

    // ── Variant A: Particle cloud ─────────────────────────────────────────────
    function buildParticles() {
      const count   = parseInt(document.getElementById('obj-count').value);
      const opacity = parseInt(document.getElementById('obj-opacity').value) / 100;
      const palette = currentTheme.colors.map(c => new THREE.Color(c));

      const pos    = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const sizes  = new Float32Array(count);

      for (let i = 0; i < count; i++) {
        pos[i*3]   = (Math.random() - 0.5) * 26;
        pos[i*3+1] = (Math.random() - 0.5) * 16;
        pos[i*3+2] = (Math.random() - 0.5) * 10 - 3;
        const c = palette[i % palette.length];
        colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
        sizes[i] = Math.random() * 2.5 + 0.8;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
      geo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

      const mat = new THREE.PointsMaterial({
        size: 0.08, vertexColors: true, transparent: true,
        opacity, sizeAttenuation: true,
      });
      const points = new THREE.Points(geo, mat);
      scene.add(points);
      sceneObjects.push(points);
      animData.push({ type: 'particles', geo, basePos: pos.slice() });
    }

    // ── Variant B: Torus rings ────────────────────────────────────────────────
    function buildRings() {
      const count   = parseInt(document.getElementById('obj-count').value);
      const opacity = parseInt(document.getElementById('obj-opacity').value) / 100;
      const colors  = currentTheme.colors;

      for (let i = 0; i < count; i++) {
        const r    = Math.random() * 2.2 + 1.0;
        const tube = Math.random() * 0.06 + 0.025;
        const mesh = new THREE.Mesh(
          new THREE.TorusGeometry(r, tube, 16, 120),
          new THREE.MeshBasicMaterial({
            color: colors[i % colors.length], transparent: true, opacity,
          })
        );
        mesh.position.set(
          (Math.random() - 0.5) * 20,
          (Math.random() - 0.5) * 12,
          (Math.random() - 0.5) * 8 - 3
        );
        mesh.rotation.set(
          Math.random() * Math.PI,
          Math.random() * Math.PI,
          Math.random() * Math.PI
        );
        scene.add(mesh);
        sceneObjects.push(mesh);
        animData.push({
          type: 'ring',
          rx: (Math.random() - 0.5) * 0.006,
          ry: (Math.random() - 0.5) * 0.006,
          rz: (Math.random() - 0.5) * 0.004,
        });
      }
    }

    // ── Variant C: Spheres ────────────────────────────────────────────────────
    function buildSpheres() {
      const count   = parseInt(document.getElementById('obj-count').value);
      const opacity = parseInt(document.getElementById('obj-opacity').value) / 100;
      const colors  = currentTheme.colors;

      for (let i = 0; i < count; i++) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(1, 40, 40),
          new THREE.MeshPhongMaterial({
            color: colors[i % colors.length], transparent: true, opacity, shininess: 120,
          })
        );
        const px = (Math.random() - 0.5) * 22;
        const py = (Math.random() - 0.5) * 14;
        mesh.position.set(px, py, (Math.random() - 0.5) * 8 - 4);
        mesh.scale.setScalar(Math.random() * 1.8 + 0.4);
        scene.add(mesh);
        sceneObjects.push(mesh);
        animData.push({ type: 'sphere', baseY: py, offset: Math.random() * Math.PI * 2, speed: Math.random() * 0.4 + 0.3 });
      }
    }

    // ── README: Perspective grid + wireframe polyhedra ───────────────────────
    function buildGrid() {
      const count   = parseInt(document.getElementById('obj-count').value);
      const opacity = parseInt(document.getElementById('obj-opacity').value) / 100;
      const colors  = currentTheme.colors;

      // Floor grid
      const grid = new THREE.GridHelper(60, 36, colors[0], colors[1]);
      grid.position.y = -7;
      grid.material.transparent = true;
      grid.material.opacity = opacity * 0.5;
      scene.add(grid);
      sceneObjects.push(grid);
      animData.push({ type: 'grid' });

      // Wireframe polyhedra
      const geoFns = [
        () => new THREE.IcosahedronGeometry(1.6, 1),
        () => new THREE.OctahedronGeometry(1.3),
        () => new THREE.DodecahedronGeometry(1.1),
        () => new THREE.IcosahedronGeometry(0.9, 0),
        () => new THREE.OctahedronGeometry(0.7),
        () => new THREE.IcosahedronGeometry(2.0, 1),
        () => new THREE.DodecahedronGeometry(0.6),
        () => new THREE.OctahedronGeometry(1.8),
      ];

      for (let i = 0; i < count; i++) {
        const geo   = geoFns[i % geoFns.length]();
        const edges = new THREE.EdgesGeometry(geo);
        const mesh  = new THREE.LineSegments(
          edges,
          new THREE.LineBasicMaterial({ color: colors[i % colors.length], transparent: true, opacity })
        );
        mesh.position.set(
          (Math.random() - 0.5) * 22,
          (Math.random() - 0.5) * 8,
          (Math.random() - 0.5) * 8 - 2
        );
        mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        scene.add(mesh);
        sceneObjects.push(mesh);
        animData.push({
          type: 'wireframe',
          rx: (Math.random() - 0.5) * 0.007,
          ry: (Math.random() - 0.5) * 0.007,
          rz: (Math.random() - 0.5) * 0.004,
        });
      }

      // Scanline particles floating above grid
      const pCount = 120;
      const pPos   = new Float32Array(pCount * 3);
      const pCol   = new Float32Array(pCount * 3);
      const palette = colors.map(c => new THREE.Color(c));
      for (let i = 0; i < pCount; i++) {
        pPos[i*3]   = (Math.random() - 0.5) * 30;
        pPos[i*3+1] = Math.random() * 10 - 6;
        pPos[i*3+2] = (Math.random() - 0.5) * 14;
        const c = palette[i % palette.length];
        pCol[i*3] = c.r; pCol[i*3+1] = c.g; pCol[i*3+2] = c.b;
      }
      const pGeo = new THREE.BufferGeometry();
      pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
      pGeo.setAttribute('color',    new THREE.BufferAttribute(pCol, 3));
      const pts = new THREE.Points(pGeo, new THREE.PointsMaterial({ size: 0.07, vertexColors: true, transparent: true, opacity: opacity * 0.7, sizeAttenuation: true }));
      scene.add(pts);
      sceneObjects.push(pts);
      animData.push({ type: 'particles' });
    }

    function buildScene() {
      clearScene();
      const shape = currentTheme.shape;
      if (shape === 'particles') buildParticles();
      else if (shape === 'rings') buildRings();
      else if (shape === 'grid') buildGrid();
      else buildSpheres();
    }
    buildScene();

    // ── Per-frame animation ───────────────────────────────────────────────────
    function animateScene(t) {
      sceneObjects.forEach((obj, i) => {
        const d = animData[i];
        if (d.type === 'sphere') {
          obj.position.y = d.baseY + Math.sin(t * d.speed + d.offset) * 1.5;
          obj.rotation.y += 0.004; obj.rotation.x += 0.002;
        } else if (d.type === 'ring') {
          obj.rotation.x += d.rx;
          obj.rotation.y += d.ry;
          obj.rotation.z += d.rz;
        } else if (d.type === 'wireframe') {
          obj.rotation.x += d.rx;
          obj.rotation.y += d.ry;
          obj.rotation.z += d.rz;
        } else if (d.type === 'particles') {
          obj.rotation.y += 0.0008;
          obj.rotation.x += 0.0003;
        } else if (d.type === 'grid') {
          // static
        }
      });
    }

    // ── 2D text helpers ───────────────────────────────────────────────────────
    function wrapText(text, maxLen) {
      if (text.length <= maxLen) return [text];
      const lines = []; let cur = '';
      for (const ch of text) {
        cur += ch;
        if (cur.length >= maxLen && /[。、.,]/.test(ch)) { lines.push(cur); cur = ''; }
      }
      if (cur) lines.push(cur);
      return lines;
    }

    // ── Composite (called every frame) ────────────────────────────────────────
    // renderer.render() must be immediately before ctx.drawImage() so the
    // WebGL buffer is still populated (it clears at the start of the next render).
    function composite() {
      renderer.render(scene, camera);
      ctx.drawImage(threeCanvas, 0, 0);

      const vig = currentTheme.vigRgb;
      const vL = ctx.createLinearGradient(0, 0, W * 0.72, 0);
      vL.addColorStop(0,   `rgba(${vig},0.90)`);
      vL.addColorStop(0.5, `rgba(${vig},0.58)`);
      vL.addColorStop(1,   `rgba(${vig},0.0)`);
      ctx.fillStyle = vL; ctx.fillRect(0, 0, W, H);

      const vV = ctx.createLinearGradient(0, 0, 0, H);
      vV.addColorStop(0,    `rgba(${vig},0.52)`);
      vV.addColorStop(0.35, `rgba(${vig},0)`);
      vV.addColorStop(0.7,  `rgba(${vig},0)`);
      vV.addColorStop(1,    `rgba(${vig},0.58)`);
      ctx.fillStyle = vV; ctx.fillRect(0, 0, W, H);

      const PX = 72;
      const th = currentTheme;
      const eyebrow  = document.getElementById('eyebrow').value.trim();
      const headline = document.getElementById('headline').value.trim();
      const subcopy  = document.getElementById('subcopy').value.trim();

      // Accent bar
      ctx.save();
      const barG = ctx.createLinearGradient(PX, 0, PX + 96, 0);
      barG.addColorStop(0, th.accent1); barG.addColorStop(1, th.accent2);
      ctx.fillStyle = barG; ctx.fillRect(PX, 188, 88, 4);
      ctx.restore();

      // Eyebrow
      if (eyebrow) {
        ctx.save();
        ctx.font = '400 20px system-ui,sans-serif';
        ctx.fillStyle = th.eyebrowColor;
        ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
        ctx.fillText(eyebrow, PX, 226);
        ctx.restore();
      }

      // Headline
      const lines = wrapText(headline, 16);
      ctx.save();
      ctx.font = '900 66px system-ui,sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      ctx.shadowColor = th.glowColor; ctx.shadowBlur = 22;
      ctx.fillStyle = '#ffffff';
      lines.forEach((line, i) => ctx.fillText(line, PX, 314 + i * 84));
      ctx.restore();

      // Subcopy
      ctx.save();
      ctx.font = '400 25px system-ui,sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.66)';
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(subcopy, PX, 314 + lines.length * 84 + 30);
      ctx.restore();

      // URL
      ctx.save();
      ctx.font = '400 17px "SF Mono","Fira Code",monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
      ctx.fillText('aooba.net', W - PX, H - 38);
      ctx.restore();
    }

    function compositeReadme() {
      renderer.render(scene, camera);
      ctx.drawImage(threeCanvas, 0, 0);

      const vig = currentTheme.vigRgb;

      // Full dark overlay — lighter than OG so grid shows through
      ctx.fillStyle = `rgba(${vig},0.55)`;
      ctx.fillRect(0, 0, W, H);

      // Top/bottom vignette
      const vV = ctx.createLinearGradient(0, 0, 0, H);
      vV.addColorStop(0,   `rgba(${vig},0.7)`);
      vV.addColorStop(0.3, `rgba(${vig},0)`);
      vV.addColorStop(0.7, `rgba(${vig},0)`);
      vV.addColorStop(1,   `rgba(${vig},0.75)`);
      ctx.fillStyle = vV; ctx.fillRect(0, 0, W, H);

      const th = currentTheme;
      const eyebrow  = document.getElementById('eyebrow').value.trim();
      const headline = document.getElementById('headline').value.trim();
      const subcopy  = document.getElementById('subcopy').value.trim();
      const CX = W / 2;

      // Stack line (eyebrow) — monospace, top center
      ctx.save();
      ctx.font = '500 16px "SF Mono","Fira Code",Consolas,monospace';
      ctx.fillStyle = th.eyebrowColor;
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.globalAlpha = 0.75;
      ctx.fillText(eyebrow, CX, 220);
      ctx.globalAlpha = 1;
      ctx.restore();

      // Accent line below stack
      ctx.save();
      const barG = ctx.createLinearGradient(CX - 100, 0, CX + 100, 0);
      barG.addColorStop(0, 'rgba(0,208,132,0)');
      barG.addColorStop(0.5, th.accent1);
      barG.addColorStop(1, 'rgba(0,180,216,0)');
      ctx.fillStyle = barG;
      ctx.fillRect(CX - 100, 238, 200, 2);
      ctx.restore();

      // Headline — large, centered, monospace for tech feel
      ctx.save();
      ctx.font = '900 96px "SF Mono","Fira Code",Consolas,system-ui,monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.shadowColor = th.glowColor; ctx.shadowBlur = 36;
      // Gradient text via clip
      const textGrad = ctx.createLinearGradient(CX - 250, 0, CX + 250, 0);
      textGrad.addColorStop(0, '#ffffff');
      textGrad.addColorStop(0.5, th.accent1);
      textGrad.addColorStop(1, th.accent2);
      ctx.fillStyle = textGrad;
      ctx.fillText(headline, CX, 360);
      ctx.restore();

      // Subcopy — centered
      ctx.save();
      ctx.font = '400 22px system-ui,sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(subcopy, CX, 410);
      ctx.restore();

      // Bottom: tech badge chips
      const badges = ['Next.js 16', 'TypeScript', 'Three.js', 'Tailwind v4', 'Neon', 'Vercel'];
      const badgeFont = '500 14px "SF Mono","Fira Code",monospace';
      ctx.font = badgeFont;
      const totalW = badges.reduce((s, b) => s + ctx.measureText(b).width + 28, 0) + (badges.length - 1) * 10;
      let bx = CX - totalW / 2;
      const by = H - 72;
      badges.forEach((label, i) => {
        ctx.save();
        ctx.font = badgeFont;
        const tw = ctx.measureText(label).width;
        const bw = tw + 28, bh = 28, br = 14;
        // pill background
        ctx.beginPath();
        ctx.moveTo(bx + br, by); ctx.lineTo(bx + bw - br, by);
        ctx.arcTo(bx + bw, by, bx + bw, by + br, br);
        ctx.lineTo(bx + bw, by + bh - br);
        ctx.arcTo(bx + bw, by + bh, bx + bw - br, by + bh, br);
        ctx.lineTo(bx + br, by + bh);
        ctx.arcTo(bx, by + bh, bx, by + bh - br, br);
        ctx.lineTo(bx, by + br);
        ctx.arcTo(bx, by, bx + br, by, br);
        ctx.closePath();
        const hex = currentTheme.colors[i % currentTheme.colors.length];
        const cr = (hex >> 16) & 0xff, cg = (hex >> 8) & 0xff, cb = hex & 0xff;
        ctx.fillStyle = `rgba(${cr},${cg},${cb},0.12)`;
        ctx.fill();
        ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.45)`;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = `rgba(${cr},${cg},${cb},0.9)`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(label, bx + bw / 2, by + bh / 2);
        ctx.restore();
        bx += bw + 10;
      });

      // URL bottom right
      ctx.save();
      ctx.font = '400 15px "SF Mono","Fira Code",monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
      ctx.fillText('aooba.net', W - 64, H - 36);
      ctx.restore();
    }

    // ── Animation loop ────────────────────────────────────────────────────────
    let frozen = false, t = 0;
    function animate() {
      requestAnimationFrame(animate);
      if (!frozen) { t += 0.016; animateScene(t); }
      activeVariant === 'README' ? compositeReadme() : composite();
    }
    animate();

    // ── Apply variant ─────────────────────────────────────────────────────────
    function applyVariant(key) {
      activeVariant = key;
      currentTheme  = THEMES[key];

      document.documentElement.style.setProperty('--theme-color', currentTheme.themeColor);

      // Update slider range + label for this shape type
      const countEl = document.getElementById('obj-count');
      countEl.min   = currentTheme.countMin;
      countEl.max   = currentTheme.countMax;
      countEl.value = currentTheme.countDefault;
      document.getElementById('count-label').textContent = currentTheme.countLabel;
      document.getElementById('obj-opacity').value = currentTheme.opacityDefault;

      // Update copy
      const c = currentTheme.copy;
      document.getElementById('eyebrow').value  = c.eyebrow;
      document.getElementById('headline').value = c.headline;
      document.getElementById('subcopy').value  = c.subcopy;

      // Update Three.js
      keyLight.color.set(currentTheme.keyColor);
      fillLight.color.set(currentTheme.fillColor);
      updateBg();
      buildScene();

      // Active tab highlight
      document.querySelectorAll('.btn-variant').forEach(b => {
        b.classList.toggle('active', b.dataset.variant === key);
      });
    }

    // Init CSS var
    document.documentElement.style.setProperty('--theme-color', currentTheme.themeColor);

    // ── Events ────────────────────────────────────────────────────────────────
    document.querySelectorAll('.btn-variant').forEach(btn => {
      btn.addEventListener('click', () => applyVariant(btn.dataset.variant));
    });

    document.getElementById('btn-freeze').addEventListener('click', function() {
      frozen = !frozen;
      this.textContent = frozen ? '▶ Play' : '⏸ Freeze';
    });

    document.getElementById('btn-randomize').addEventListener('click', buildScene);
    document.getElementById('bg-lightness').addEventListener('input', updateBg);
    document.getElementById('obj-count').addEventListener('input', buildScene);
    document.getElementById('obj-opacity').addEventListener('input', () => {
      const op = parseInt(document.getElementById('obj-opacity').value) / 100;
      sceneObjects.forEach(o => {
        if (o.material) o.material.opacity = op;
      });
    });

    document.getElementById('btn-save').addEventListener('click', () => {
      frozen = true;
      document.getElementById('btn-freeze').textContent = '▶ Play';
      composite();
      const link = document.createElement('a');
      link.download = activeVariant === 'README' ? 'readme-banner.png' : `og-image-variant-${activeVariant.toLowerCase()}.png`;
      link.href = output.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
